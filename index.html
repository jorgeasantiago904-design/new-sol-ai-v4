<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chatgpt AI Interface</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #212121;
      color: #ececec;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background-color: #171717;
      display: flex;
      flex-direction: column;
      padding: 12px;
      border-right: 1px solid #2f2f2f;
      flex-shrink: 0;
    }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background-color: transparent;
      color: #ececec;
      border: 1px solid #424242;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      text-align: left;
    }

    .new-chat-btn:hover {
      background-color: #212121;
    }

    .sidebar-history {
      flex: 1;
      margin-top: 20px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      font-size: 14px;
      color: #b4b4b4;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 0.2s;
    }

    .history-item:hover, .history-item.active {
      background-color: #212121;
      color: #fff;
    }

    .chat-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      margin-right: 8px;
    }

    .delete-chat-btn {
      background: none;
      border: none;
      color: #8e8e8e;
      font-size: 16px;
      cursor: pointer;
      display: none;
      padding: 0 4px;
      line-height: 1;
    }

    .history-item:hover .delete-chat-btn {
      display: block;
    }

    .delete-chat-btn:hover {
      color: #ff5555;
    }

    /* Main Container */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
    }

    .header {
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      color: #b4b4b4;
      border-bottom: 1px solid #2f2f2f;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .rate-status {
      font-size: 12px;
      font-weight: normal;
      color: #8e8e8e;
    }

    /* Chat Messages Box */
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0 120px 0;
      display: flex;
      flex-direction: column;
    }

    .message-row {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 18px 20px;
    }

    .message-content {
      max-width: 768px;
      width: 100%;
      display: flex;
      gap: 16px;
      line-height: 1.6;
      font-size: 15px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 13px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .user .avatar {
      background-color: #5436da;
      color: white;
    }

    .bot .avatar {
      background-color: transparent;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* Formatting & Text Styling */
    .text-body {
      flex: 1;
      word-break: break-word;
      padding-top: 4px;
    }

    .text-body p {
      margin-bottom: 12px;
    }

    .text-body p:last-child {
      margin-bottom: 0;
    }

    .text-body a {
      color: #58a6ff;
      text-decoration: underline;
      font-weight: 500;
    }

    .text-body a:hover {
      text-decoration: none;
    }

    .text-body ul, .text-body ol {
      margin-left: 20px;
      margin-bottom: 12px;
    }

    .text-body li {
      margin-bottom: 4px;
    }

    .text-body code {
      background-color: #2d2d2d;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 14px;
    }

    .text-body pre {
      background-color: #1e1e1e;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 12px;
      border: 1px solid #333;
    }

    .text-body pre code {
      background: transparent;
      padding: 0;
    }

    .text-body h1, .text-body h2, .text-body h3, .text-body h4 {
      margin-top: 16px;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .text-body table {
      border-collapse: collapse;
      margin-bottom: 12px;
      width: 100%;
    }

    .text-body th, .text-body td {
      border: 1px solid #424242;
      padding: 8px 12px;
      text-align: left;
    }

    .text-body th {
      background-color: #2d2d2d;
    }

    /* Input Footer Area */
    .input-wrapper {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(180deg, rgba(33,33,33,0) 0%, #212121 40%);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .input-container {
      max-width: 768px;
      width: 100%;
      background-color: #2f2f2f;
      border: 1px solid #424242;
      border-radius: 24px;
      display: flex;
      align-items: center;
      padding: 8px 12px 8px 18px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    .input-container:focus-within {
      border-color: #666;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 150px;
      height: 24px;
      line-height: 24px;
    }

    .send-btn {
      background-color: #676767;
      color: #212121;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      margin-left: 8px;
    }

    .send-btn.active {
      background-color: #ffffff;
      color: #000000;
    }

    .disclaimer {
      font-size: 12px;
      color: #8e8e8e;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <button class="new-chat-btn" onclick="createNewChat()">
      <span>+</span> New chat
    </button>
    <div class="sidebar-history" id="sidebarHistory"></div>
  </div>

  <div class="main-container">
    <div class="header">
      <span>chatgpt AI</span>
      <span class="rate-status" id="rateStatus">RPM: 0/300 | TPM: 0/70k</span>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-wrapper">
      <div class="input-container">
        <textarea id="userInput" placeholder="Message chatgpt AI..." rows="1" oninput="adjustInput(this)" onkeydown="handleKeyDown(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </button>
      </div>
      <div class="disclaimer">chatgpt AI can make mistakes. Check important info.</div>
    </div>
  </div>

  <script>
    const API_KEY = "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"; 
    const MODEL_NAME = "llama-3.3-70b-versatile";
    const AVATAR_URL = "https://img.icons8.com/?size=100&id=u9JE2GppVZoD&format=png&color=FFFFFF";

    const LIMITS = {
      RPM: 300,
      RPD: 250000,
      TPM: 70000,
      TPD: Infinity
    };

    let chats = [];
    let activeChatId = null;
    let rateTracker = { requests: [], tokenLogs: [] };

    if (typeof marked !== 'undefined') {
      marked.use({ gfm: true, breaks: true });
    }

    window.onload = () => {
      const storedChats = localStorage.getItem("chat_history");
      const storedActiveId = localStorage.getItem("active_chat_id");
      const storedTracker = localStorage.getItem("rate_tracker");

      if (storedTracker) {
        try { rateTracker = JSON.parse(storedTracker); } catch (e) {}
      }

      if (storedChats) {
        try {
          chats = JSON.parse(storedChats);
          activeChatId = storedActiveId || (chats[0] ? chats[0].id : null);
        } catch (e) {
          chats = [];
        }
      }

      if (!chats.length || !activeChatId) {
        createNewChat();
      } else {
        renderSidebar();
        renderActiveChat();
      }

      updateStatusDisplay();
    };

    function saveState() {
      localStorage.setItem("chat_history", JSON.stringify(chats));
      localStorage.setItem("active_chat_id", activeChatId);
      localStorage.setItem("rate_tracker", JSON.stringify(rateTracker));
    }

    function estimateTokens(text) {
      return Math.ceil(text.length / 4) + 5;
    }

    function cleanTracker() {
      const now = Date.now();
      const oneMinuteAgo = now - 60 * 1000;
      const oneDayAgo = now - 24 * 60 * 60 * 1000;

      rateTracker.requests = rateTracker.requests.filter(ts => ts > oneDayAgo);
      rateTracker.tokenLogs = rateTracker.tokenLogs.filter(log => log.timestamp > oneMinuteAgo);
    }

    function checkRateLimits(estimatedNewTokens) {
      cleanTracker();
      const now = Date.now();
      const oneMinuteAgo = now - 60 * 1000;

      const requestsLastMinute = rateTracker.requests.filter(ts => ts > oneMinuteAgo).length;
      const requestsLastDay = rateTracker.requests.length;

      const tokensLastMinute = rateTracker.tokenLogs
        .filter(log => log.timestamp > oneMinuteAgo)
        .reduce((sum, log) => sum + log.count, 0);

      if (requestsLastMinute >= LIMITS.RPM) {
        return { allowed: false, reason: "RPM limit reached (300 req/min). Please wait a moment." };
      }
      if (requestsLastDay >= LIMITS.RPD) {
        return { allowed: false, reason: "Daily request limit reached (250,000 req/day)." };
      }
      if (tokensLastMinute + estimatedNewTokens > LIMITS.TPM) {
        return { allowed: false, reason: "TPM limit reached (70,000 tokens/min). Please wait a minute." };
      }

      return { allowed: true };
    }

    function recordUsage(tokensUsed) {
      const now = Date.now();
      rateTracker.requests.push(now);
      rateTracker.tokenLogs.push({ timestamp: now, count: tokensUsed });
      saveState();
      updateStatusDisplay();
    }

    function updateStatusDisplay() {
      cleanTracker();
      const now = Date.now();
      const oneMinuteAgo = now - 60 * 1000;

      const rpmCurrent = rateTracker.requests.filter(ts => ts > oneMinuteAgo).length;
      const tpmCurrent = rateTracker.tokenLogs
        .filter(log => log.timestamp > oneMinuteAgo)
        .reduce((sum, log) => sum + log.count, 0);

      document.getElementById("rateStatus").innerText = `RPM: ${rpmCurrent}/300 | TPM: ${tpmCurrent}/70k`;
    }

    function createNewChat() {
      const newId = "chat_" + Date.now();
      const newChat = {
        id: newId,
        title: "New Chat",
        messages: [{ role: "system", content: "You are ChatGPT, a large language model trained by OpenAI. Your primary goal is to be helpful, harmless, and honest. You do not have feelings, personal opinions, or consciousness. If asked about your identity, always state that you are an AI created by OpenAI.Neutral and Objective: Maintain a polite, professional, and unbiased tone. Avoid expressing personal beliefs, political opinions, or emotional states.Clear and Concise: Deliver information in a straightforward manner. Do not be overly chatty unless the user's prompt requires a conversational or creative tone.Structured Formatting: Use Markdown formatting (such as bullet points, bold text, and headers) to make complex information easy to read and digest.Accuracy: Prioritize factual accuracy. If you do not know the answer to a question or if the information is beyond your training data, clearly state that you do not know rather than guessing or hallucinating information. Safety: You must politely decline any requests that promote violence, illegal acts, self-harm, hate speech, or sexually explicit content.Task Adherence: Follow the user's instructions carefully. If a user asks for code, provide well-commented and functional code. If they ask for creative writing, match the requested genre and style." }]
      };
      chats.unshift(newChat);
      activeChatId = newId;
      saveState();
      renderSidebar();
      renderActiveChat();
    }

    function switchChat(id) {
      activeChatId = id;
      saveState();
      renderSidebar();
      renderActiveChat();
    }

    function deleteChat(id, event) {
      event.stopPropagation();
      chats = chats.filter(c => c.id !== id);
      
      if (chats.length === 0) {
        createNewChat();
      } else {
        if (activeChatId === id) {
          activeChatId = chats[0].id;
        }
        saveState();
        renderSidebar();
        renderActiveChat();
      }
    }

    function renderSidebar() {
      const historyContainer = document.getElementById("sidebarHistory");
      historyContainer.innerHTML = "";

      chats.forEach(chat => {
        const item = document.createElement("div");
        item.className = `history-item ${chat.id === activeChatId ? "active" : ""}`;
        item.onclick = () => switchChat(chat.id);

        const titleSpan = document.createElement("span");
        titleSpan.className = "chat-title";
        titleSpan.innerText = chat.title;

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-chat-btn";
        deleteBtn.innerHTML = "&times;";
        deleteBtn.title = "Delete Chat";
        deleteBtn.onclick = (e) => deleteChat(chat.id, e);

        item.appendChild(titleSpan);
        item.appendChild(deleteBtn);
        historyContainer.appendChild(item);
      });
    }

    function renderActiveChat() {
      const chatBox = document.getElementById("chatBox");
      chatBox.innerHTML = "";

      const activeChat = chats.find(c => c.id === activeChatId);
      if (!activeChat) return;

      const userAndAssistantMessages = activeChat.messages.filter(m => m.role !== "system");

      if (userAndAssistantMessages.length === 0) {
        appendMessageUI("Hello! I am chatgpt AI. How can I help you today?", "assistant");
        return;
      }

      userAndAssistantMessages.forEach(msg => {
        appendMessageUI(msg.content, msg.role === "user" ? "user" : "assistant");
      });
    }

    function formatMessageContent(rawText) {
      if (typeof marked !== 'undefined') {
        try {
          let parsedHtml = marked.parse(rawText);
          return parsedHtml.replace(/<a href="/g, '<a target="_blank" rel="noopener noreferrer" href="');
        } catch (e) {
          return rawText;
        }
      }
      return rawText;
    }

    async function sendMessage() {
      const inputField = document.getElementById("userInput");
      const userText = inputField.value.trim();

      if (userText === "") return;

      const activeChat = chats.find(c => c.id === activeChatId);
      if (!activeChat) return;

      const promptTokens = estimateTokens(userText);
      const limitCheck = checkRateLimits(promptTokens);

      if (!limitCheck.allowed) {
        alert(limitCheck.reason);
        return;
      }

      const userMessageCount = activeChat.messages.filter(m => m.role === "user").length;
      if (userMessageCount === 0) {
        activeChat.title = userText.length > 25 ? userText.slice(0, 25) + "..." : userText;
        renderSidebar();
      }

      activeChat.messages.push({ role: "user", content: userText });
      
      if (userMessageCount === 0) {
        document.getElementById("chatBox").innerHTML = "";
      }
      appendMessageUI(userText, "user");

      inputField.value = "";
      adjustInput(inputField);

      const botTextElement = appendMessageUI("", "assistant");
      saveState();

      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: MODEL_NAME,
            messages: activeChat.messages,
            temperature: 0.6,
            max_completion_tokens: 8192,
            top_p: 1,
            stream: true,
            compound_custom: {
              tools: {
                enabled_tools: [
                  "web_search",
                  "code_interpreter",
                  "visit_website"
                ]
              }
            }
          })
        });
        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          botTextElement.innerText = "Error: " + (errData.error?.message || "Failed to fetch response.");
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let fullReply = "";
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          
          if (value) {
            buffer += decoder.decode(value, { stream: !done });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
              const trimmed = line.trim();
              if (trimmed.startsWith("data: ") && trimmed !== "data: [DONE]") {
                try {
                  const parsed = JSON.parse(trimmed.slice(6));
                  const content = parsed.choices[0]?.delta?.content || "";
                  fullReply += content;
                  botTextElement.innerHTML = formatMessageContent(fullReply);
                  document.getElementById("chatBox").scrollTop = document.getElementById("chatBox").scrollHeight;
                } catch (e) {}
              }
            }
          }

          if (done) {
            if (buffer.trim().startsWith("data: ") && buffer.trim() !== "data: [DONE]") {
              try {
                const parsed = JSON.parse(buffer.trim().slice(6));
                const content = parsed.choices[0]?.delta?.content || "";
                fullReply += content;
                botTextElement.innerHTML = formatMessageContent(fullReply);
              } catch (e) {}
            }
            break;
          }
        }

        if (fullReply) {
          activeChat.messages.push({ role: "assistant", content: fullReply });
          const totalTokensUsed = promptTokens + estimateTokens(fullReply);
          recordUsage(totalTokensUsed);
        }

      } catch (err) {
        botTextElement.innerText = "Network error. Please check your connection.";
        console.error(err);
      }

      saveState();
    }

    function appendMessageUI(text, sender) {
      const chatBox = document.getElementById("chatBox");

      const row = document.createElement("div");
      row.classList.add("message-row", sender);

      const content = document.createElement("div");
      content.classList.add("message-content");

      const avatar = document.createElement("div");
      avatar.classList.add("avatar");

      if (sender === "user") {
        avatar.innerText = "U";
      } else {
        const img = document.createElement("img");
        img.src = AVATAR_URL;
        img.alt = "chatgpt AI Avatar";
        avatar.appendChild(img);
      }

      const textBody = document.createElement("div");
      textBody.classList.add("text-body");
      
      if (sender === "user") {
        textBody.innerText = text;
      } else {
        textBody.innerHTML = formatMessageContent(text);
      }

      content.appendChild(avatar);
      content.appendChild(textBody);
      row.appendChild(content);
      chatBox.appendChild(row);

      chatBox.scrollTop = chatBox.scrollHeight;
      return textBody;
    }

    function adjustInput(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 150) + 'px';
      
      const sendBtn = document.getElementById("sendBtn");
      if (el.value.trim() !== "") {
        sendBtn.classList.add("active");
      } else {
        sendBtn.classList.remove("active");
      }
    }

    function handleKeyDown(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }
  </script>
</body>
</html>
